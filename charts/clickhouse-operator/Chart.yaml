apiVersion: v2
name: clickhouse-operator
description: >-
  ClickHouse Kubernetes operator (controller + clickhouse.com CRDs) for the Krateo ClickStack
  observability data layer, packaged as a Krateo composition. Thin dependency-WRAPPER over the
  UNFORKED upstream clickhouse-operator-helm chart; the admission webhook + cert-manager
  Certificates are disabled (the operator still reconciles ClickHouseCluster / KeeperCluster).
  Its CRDs ship in the upstream chart's templates/ (not crds/), so core-provider applies them
  on render and the composition's helm release deletes them cleanly on teardown. The installer
  wires `krateo-clickstack` to depend on this composition, so the clickhouse.com CRDs are
  established AND the operator is running before any ClickHouseCluster CR renders. No fork of
  upstream.
type: application
# version = this Krateo wrapper's own release stream. appVersion = the upstream
# clickhouse-operator-helm version actually deployed.
version: 0.1.0
appVersion: "0.0.5"
home: https://krateo.io
icon: https://github.com/krateoplatformops/krateo/blob/main/docs/media/logo.svg
sources:
  - https://github.com/ClickHouse/clickhouse-kubernetes-operator
  - https://github.com/braghettos/krateo-clickstack-operators-chart
dependencies:
  # Aliased to `operator`: a values key named `clickhouse-operator` would pascalize to this
  # chart's own Kind (ClickhouseOperator) and collide in core-provider's crdgen struct-naming.
  # The alias makes Helm read the subchart's values from `operator:`.
  - name: clickhouse-operator-helm
    alias: operator
    version: "0.0.5"
    repository: oci://ghcr.io/clickhouse
